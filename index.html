<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Atalhos · Arraste entre abas + reordenar (URLs ocultas)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* CABEÇALHO GLOBAL + BUSCA GLOBAL */
        .global-header {
            background: #0f172a;
            color: white;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e293b;
        }

        .global-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .global-header h1 small {
            font-size: 0.75rem;
            background: #334155;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: normal;
        }

        .save-badge {
            background: #2dd4bf;
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            box-shadow: 0 0 0 1px #14b8a6;
        }

        .global-search-area {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .global-search-area input[type="text"] {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .global-search-area input[type="text"]:focus {
            border-color: #3b82f6;
            background: #0f172a;
        }

        .csv-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .btn-export, .btn-import {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-export:hover { background: #2563eb; }
        
        .btn-import { background: #10b981; }
        .btn-import:hover { background: #059669; }

        .global-results {
            background: #1e293b;
            border-radius: 18px;
            padding: 8px 12px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
            display: none;
        }

        .global-results.show {
            display: block;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 8px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: 0.1s;
        }

        .result-item:hover {
            background: #334155;
            border-radius: 12px;
        }

        .result-info strong { color: #facc15; }
        .result-info span { color: #cbd5e1; font-size: 0.75rem; }

        .result-action {
            background: #3b82f6;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* ABAS SUPERIOR */
        .tabs-bar {
            background: #f8fafc;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            padding: 12px 20px 0 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px 30px 12px 12px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
            user-select: none;
        }

        .tab-btn.active {
            background: white;
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.02);
        }

        .tab-btn:hover:not(.active) { background: #e2e8f0; }

        .add-tab-btn {
            background: #d9f99d;
            color: #3f6212;
            margin-left: 8px;
            font-weight: bold;
        }

        .tab-btn.drop-active {
            background: #bfdbfe;
            border: 1px dashed #2563eb;
            transform: scale(1.02);
        }

        /* CLASSES PARA ARRASTAR ABAS */
        .tab-btn.dragging-tab {
            opacity: 0.4;
            transform: scale(0.95);
        }
        .tab-btn.drop-tab-before {
            border-left: 4px solid #3b82f6;
        }
        .tab-btn.drop-tab-after {
            border-right: 4px solid #3b82f6;
        }

        /* CONTEÚDO DA ABA */
        .tab-content-pane {
            padding: 24px 28px;
            background: #ffffff;
            transition: 0.1s;
        }

        .tab-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eef2ff;
        }

        .tab-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f5f9;
            padding: 4px 15px 4px 20px;
            border-radius: 60px;
        }

        .tab-title-area h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0f172a;
        }

        .edit-name-btn, .delete-tab-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            transition: 0.1s;
        }

        .edit-name-btn:hover { background: #e2e8f0; }
        .delete-tab-btn { color: #dc2626; }
        .delete-tab-btn:hover { background: #fee2e2; }

        .shortcuts-section { width: 100%; }

        .filter-shortcuts { margin-bottom: 20px; }
        .filter-shortcuts input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.85rem;
            outline: none;
        }

        .shortcuts-list {
            list-style: none;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 4px 2px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            min-height: 120px;
            background: #ffffff;
            border-radius: 20px;
        }

        .shortcut-item {
            background: #f8fafc;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 8px 20px;
            transition: 0.1s;
            border: 1px solid #eef2ff;
            cursor: grab;
            user-select: none;
        }
        .shortcut-item:active { cursor: grabbing; }
        .shortcut-item.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }

        .shortcut-item:hover {
            background: #eef2ff;
            transform: scale(0.99);
        }

        .shortcut-link {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            color: #1e40af;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .shortcut-link strong {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .item-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 8px;
            border-radius: 30px;
        }

        .edit-shortcut { color: #f59e0b; }
        .delete-shortcut { color: #dc2626; }
        .open-newtab { color: #3b82f6; }

        .add-shortcut-form {
            margin-top: 24px;
            background: #f1f5f9;
            padding: 18px;
            border-radius: 28px;
        }
        .add-shortcut-form h4 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .form-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        .form-row button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            background: #f8fafc;
            border-radius: 40px;
            grid-column: 1 / -1;
        }

        button { transition: all 0.1s ease; }
        button:active { transform: scale(0.96); }

        .shortcut-item.drop-before {
            border-top: 3px solid #3b82f6;
            border-radius: 8px;
        }
        .shortcut-item.drop-after {
            border-bottom: 3px solid #3b82f6;
            border-radius: 8px;
        }

        @media (max-width: 750px) {
            .tab-content-pane { padding: 16px; }
            .shortcuts-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="global-header">
        <h1>
            📌 Meus Atalhos 
            <small>arraste para reordenar ou mover abas</small>
            <span class="save-badge">✅ salvo DN LINK</span>
        </h1>
        <div class="global-search-area">
            <input type="text" id="globalSearchInput" list="atalhosSalvos" placeholder="🔍 Buscar em TODOS os atalhos (por nome ou url) ..." autocomplete="off">
            <datalist id="atalhosSalvos"></datalist>
            
            <div class="csv-actions">
                <button onclick="exportarCSV()" class="btn-export">📥 Exportar .CSV</button>
                <button onclick="document.getElementById('importCsvInput').click()" class="btn-import">📤 Importar .CSV</button>
                <input type="file" id="importCsvInput" accept=".csv" style="display: none;" onchange="importarCSV(event)">
            </div>
            
            <div id="globalResults" class="global-results"></div>
        </div>
    </div>

    <div class="tabs-bar" id="tabsBar"></div>

    <div id="tabContentContainer" class="tab-content-pane"></div>
</div>

<script>
    // ---------- ESTRUTURA DE DADOS ----------
    let abas = [];
    let activeTabId = null;
    let tabFilters = {};

    let dragSource = {
        abaId: null,
        shortcutId: null,
        indexOrigem: null
    };

    let dragSourceTab = null; // Controle para arrastar as abas

    function gerarId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    function salvarDados() {
        const dados = {
            abas: abas.map(aba => ({
                id: aba.id,
                nome: aba.nome,
                shortcuts: aba.shortcuts.map(s => ({ id: s.id, nome: s.nome, url: s.url }))
            })),
            activeTabId: activeTabId,
            tabFilters: tabFilters
        };
        localStorage.setItem('app_abas_dragdrop', JSON.stringify(dados));
    }

    function carregarDados() {
        const raw = localStorage.getItem('app_abas_dragdrop');
        if (!raw) {
            const abaPrincipal = {
                id: gerarId(),
                nome: '🌟 Principal',
                shortcuts: [
                    { id: gerarId(), nome: 'Google', url: 'https://www.google.com' },
                    { id: gerarId(), nome: 'YouTube', url: 'https://www.youtube.com' },
                    { id: gerarId(), nome: 'GitHub', url: 'https://github.com' }
                ]
            };
            abas = [abaPrincipal];
            activeTabId = abaPrincipal.id;
            tabFilters = {};
            return;
        }
        try {
            const dados = JSON.parse(raw);
            abas = dados.abas;
            activeTabId = dados.activeTabId || (abas[0]?.id || null);
            tabFilters = dados.tabFilters || {};
        } catch(e) { console.warn(e); }
    }

    function normalizarUrl(url) {
        let trimmed = url.trim();
        if (!trimmed) return null;
        if (!/^https?:\/\//i.test(trimmed)) return 'https://' + trimmed;
        return trimmed;
    }

    function adicionarAtalho(abaId, nome, urlRaw) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return false;
        const url = normalizarUrl(urlRaw);
        if (!nome.trim() || !url) return false;
        aba.shortcuts.push({ id: gerarId(), nome: nome.trim(), url: url });
        salvarDados();
        renderizarInterface();
        return true;
    }

    function removerAtalho(abaId, shortcutId) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return;
        aba.shortcuts = aba.shortcuts.filter(s => s.id !== shortcutId);
        salvarDados();
        renderizarInterface();
    }

    function editarAtalho(abaId, shortcutId, novoNome, novaUrl) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return;
        const atalho = aba.shortcuts.find(s => s.id === shortcutId);
        if (atalho) {
            if (novoNome.trim()) atalho.nome = novoNome.trim();
            const urlOk = normalizarUrl(novaUrl);
            if (urlOk) atalho.url = urlOk;
        }
        salvarDados();
        renderizarInterface();
    }

    function renomearAba(abaId, novoNome) {
        const aba = abas.find(a => a.id === abaId);
        if (aba && novoNome.trim()) {
            aba.nome = novoNome.trim();
            salvarDados();
            renderizarInterface();
        }
    }

    function deletarAba(abaId) {
        if (abas.length === 1) { alert("Mantenha pelo menos uma aba!"); return; }
        const index = abas.findIndex(a => a.id === abaId);
        if (index !== -1) {
            abas.splice(index, 1);
            if (activeTabId === abaId) activeTabId = abas[0]?.id || null;
            delete tabFilters[abaId];
            salvarDados();
            renderizarInterface();
        }
    }

    function adicionarNovaAba() {
        const novaAba = {
            id: gerarId(),
            nome: `📄 Aba ${abas.length + 1}`,
            shortcuts: []
        };
        abas.push(novaAba);
        activeTabId = novaAba.id;
        salvarDados();
        renderizarInterface();
    }

    function moverAtalhoParaAba(atalhoId, origemAbaId, destinoAbaId, posicaoDestinoIndex = null) {
        if (origemAbaId === destinoAbaId && posicaoDestinoIndex === undefined) return false;
        const abaOrigem = abas.find(a => a.id === origemAbaId);
        const abaDestino = abas.find(a => a.id === destinoAbaId);
        if (!abaOrigem || !abaDestino) return false;

        const atalhoIndex = abaOrigem.shortcuts.findIndex(s => s.id === atalhoId);
        if (atalhoIndex === -1) return false;
        const [atalho] = abaOrigem.shortcuts.splice(atalhoIndex, 1);

        if (origemAbaId === destinoAbaId && typeof posicaoDestinoIndex === 'number') {
            abaDestino.shortcuts.splice(posicaoDestinoIndex, 0, atalho);
        } else {
            if (typeof posicaoDestinoIndex === 'number' && posicaoDestinoIndex >= 0 && posicaoDestinoIndex <= abaDestino.shortcuts.length) {
                abaDestino.shortcuts.splice(posicaoDestinoIndex, 0, atalho);
            } else {
                abaDestino.shortcuts.push(atalho);
            }
        }
        salvarDados();
        renderizarInterface();
        return true;
    }

    // ---------- IMPORTAÇÃO E EXPORTAÇÃO CSV ----------
    function exportarCSV() {
        let csvContent = "Aba,Nome,URL\n";
        abas.forEach(aba => {
            aba.shortcuts.forEach(s => {
                let abaNome = aba.nome.replace(/"/g, '""');
                let sNome = s.nome.replace(/"/g, '""');
                let sUrl = s.url.replace(/"/g, '""');
                csvContent += `"${abaNome}","${sNome}","${sUrl}"\n`;
            });
        });
        
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "backup_atalhos.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importarCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) {
                alert("O arquivo CSV parece estar vazio ou em um formato incorreto.");
                return;
            }

            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            let countImportados = 0;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let row = lines[i].split(regex).map(val => val.replace(/^"|"$/g, '').replace(/""/g, '"'));
                if (row.length >= 3) {
                    const abaNome = row[0].trim();
                    const sNome = row[1].trim();
                    const sUrl = row[2].trim();
                    
                    if (abaNome && sNome && sUrl) {
                        let aba = abas.find(a => a.nome === abaNome);
                        if (!aba) {
                            aba = { id: gerarId(), nome: abaNome, shortcuts: [] };
                            abas.push(aba);
                        }
                        
                        const exists = aba.shortcuts.find(s => s.url === sUrl && s.nome === sNome);
                        if (!exists) {
                            aba.shortcuts.push({ id: gerarId(), nome: sNome, url: sUrl });
                            countImportados++;
                        }
                    }
                }
            }
            
            salvarDados();
            renderizarInterface();
            alert(`${countImportados} atalhos importados com sucesso!`);
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    // ---------- ATUALIZAR LISTA DE AUTOCOMPLETAR (DATALIST) ----------
    function atualizarDatalistNomes() {
        const datalist = document.getElementById('atalhosSalvos');
        if (!datalist) return;
        
        datalist.innerHTML = '';
        const nomesUnicos = new Set();
        abas.forEach(aba => {
            aba.shortcuts.forEach(s => nomesUnicos.add(s.nome));
        });
        
        nomesUnicos.forEach(nome => {
            const option = document.createElement('option');
            option.value = nome;
            datalist.appendChild(option);
        });
    }

    function renderizarAbasHeader() {
        const container = document.getElementById('tabsBar');
        container.innerHTML = '';
        abas.forEach((aba, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTabId === aba.id ? 'active' : ''}`;
            btn.innerHTML = `${escapeHtml(aba.nome)} <span style="font-size:0.7rem;">📌</span>`;
            
            // Permite arrastar o botão da aba
            btn.draggable = true;
            btn.setAttribute('data-aba-id', aba.id);
            
            btn.onclick = (e) => {
                e.preventDefault();
                activeTabId = aba.id;
                salvarDados();
                renderizarInterface();
            };
            
            // EVENTOS DE DRAG PARA A ABA
            btn.addEventListener('dragstart', (e) => {
                dragSourceTab = index;
                e.dataTransfer.effectAllowed = 'move';
                btn.classList.add('dragging-tab');
            });

            btn.addEventListener('dragend', () => {
                dragSourceTab = null;
                btn.classList.remove('dragging-tab');
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('drop-active', 'drop-tab-before', 'drop-tab-after');
                });
            });

            btn.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (dragSourceTab !== null) {
                    const rect = btn.getBoundingClientRect();
                    const meio = rect.width / 2;
                    const x = e.clientX - rect.left;
                    
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('drop-tab-before', 'drop-tab-after'));
                    
                    if (x < meio) {
                        btn.classList.add('drop-tab-before');
                    } else {
                        btn.classList.add('drop-tab-after');
                    }
                } else {
                    btn.classList.add('drop-active');
                }
            });

            btn.addEventListener('dragleave', () => {
                btn.classList.remove('drop-active', 'drop-tab-before', 'drop-tab-after');
            });

            btn.addEventListener('drop', (e) => {
                e.preventDefault();
                btn.classList.remove('drop-active', 'drop-tab-before', 'drop-tab-after');

                if (dragSourceTab !== null) {
                    const rect = btn.getBoundingClientRect();
                    const meio = rect.width / 2;
                    const x = e.clientX - rect.left;
                    
                    let toIndex = index;
                    if (x >= meio) toIndex++; 

                    if (dragSourceTab < toIndex) toIndex--;

                    if (dragSourceTab !== toIndex) {
                        const abaMovida = abas.splice(dragSourceTab, 1)[0];
                        abas.splice(toIndex, 0, abaMovida);
                        salvarDados();
                        renderizarInterface();
                    }
                    dragSourceTab = null;
                } else if (dragSource.abaId && dragSource.shortcutId) {
                    moverAtalhoParaAba(dragSource.shortcutId, dragSource.abaId, aba.id, null);
                    dragSource = { abaId: null, shortcutId: null, indexOrigem: null };
                }
            });

            container.appendChild(btn);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'tab-btn add-tab-btn';
        addBtn.innerHTML = '+ Nova Aba';
        addBtn.onclick = () => adicionarNovaAba();
        container.appendChild(addBtn);
    }

    function renderizarAbaAtivaConteudo() {
        const aba = abas.find(a => a.id === activeTabId);
        if (!aba) return;

        const container = document.getElementById('tabContentContainer');
        const filtroAtual = tabFilters[activeTabId] || '';
        let atalhosFiltrados = [...aba.shortcuts];
        if (filtroAtual.trim() !== '') {
            const term = filtroAtual.trim().toLowerCase();
            atalhosFiltrados = atalhosFiltrados.filter(s => s.nome.toLowerCase().includes(term) || s.url.toLowerCase().includes(term));
        }

        const html = `
            <div class="tab-header-actions">
                <div class="tab-title-area">
                    <h2>${escapeHtml(aba.nome)}</h2>
                    <button class="edit-name-btn" id="renameTabBtn" title="Renomear aba">✏️</button>
                    <button class="delete-tab-btn" id="deleteTabBtn" title="Remover aba">🗑️</button>
                    <span style="color: #cbd5e1; margin: 0 4px;">|</span>
                    <button class="edit-name-btn" id="moveTabLeftBtn" title="Mover aba para a esquerda">⬅️</button>
                    <button class="edit-name-btn" id="moveTabRightBtn" title="Mover aba para a direita">➡️</button>
                </div>
                <div style="font-size:12px; color:#475569;">✨ Arraste atalhos: reordene na lista ou solte sobre outra aba. Arraste as abas lá em cima ou use as setas ⬅️➡️ para reordená-las.</div>
            </div>
            <div class="shortcuts-section">
                <div class="filter-shortcuts">
                    <input type="text" id="filterShortcutsInput" list="atalhosSalvos" placeholder="🔎 Filtrar atalhos (nome ou URL oculta)" value="${escapeHtml(filtroAtual)}">
                </div>
                <ul class="shortcuts-list" id="shortcutsList" data-aba-id="${aba.id}">
                    ${atalhosFiltrados.length === 0 ? '<div class="empty-msg">📭 Nenhum atalho encontrado. Adicione abaixo ou arraste de outra aba.</div>' : 
                        atalhosFiltrados.map((s, idx) => `
                            <li class="shortcut-item" draggable="true" data-shortcut-id="${s.id}" data-original-index="${idx}">
                                <div class="shortcut-link" data-url="${escapeHtml(s.url)}">
                                    <strong>🔗 ${escapeHtml(s.nome)}</strong>
                                </div>
                                <div class="item-actions">
                                    <button class="open-newtab" title="Abrir em nova aba">📎</button>
                                    <button class="edit-shortcut" title="Editar">✏️</button>
                                    <button class="delete-shortcut" title="Remover">❌</button>
                                </div>
                            </li>
                        `).join('')
                    }
                </ul>
                <div class="add-shortcut-form">
                    <h4>➕ Adicionar novo atalho a esta aba</h4>
                    <div class="form-row">
                        <input type="text" id="newShortcutNome" placeholder="Nome do atalho">
                        <input type="text" id="newShortcutUrl" placeholder="https://... ou site.com">
                        <button id="addShortcutBtn">Salvar</button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;

        // Eventos dos botões de Renomear e Excluir
        document.getElementById('renameTabBtn')?.addEventListener('click', () => {
            const novoNome = prompt('Novo nome:', aba.nome);
            if (novoNome?.trim()) renomearAba(aba.id, novoNome.trim());
        });
        document.getElementById('deleteTabBtn')?.addEventListener('click', () => {
            if (confirm(`Remover aba "${aba.nome}"?`)) deletarAba(aba.id);
        });

        // Eventos dos novos botões de mover a aba para esquerda e direita
        document.getElementById('moveTabLeftBtn')?.addEventListener('click', () => {
            const idx = abas.findIndex(a => a.id === aba.id);
            if (idx > 0) {
                const temp = abas[idx];
                abas[idx] = abas[idx - 1];
                abas[idx - 1] = temp;
                salvarDados();
                renderizarInterface();
            }
        });
        document.getElementById('moveTabRightBtn')?.addEventListener('click', () => {
            const idx = abas.findIndex(a => a.id === aba.id);
            if (idx !== -1 && idx < abas.length - 1) {
                const temp = abas[idx];
                abas[idx] = abas[idx + 1];
                abas[idx + 1] = temp;
                salvarDados();
                renderizarInterface();
            }
        });

        const filterInput = document.getElementById('filterShortcutsInput');
        if (filterInput) {
            filterInput.addEventListener('input', (e) => {
                tabFilters[activeTabId] = e.target.value;
                salvarDados();
                renderizarAbaAtivaConteudo();
            });
        }
        const addBtn = document.getElementById('addShortcutBtn');
        const nomeInp = document.getElementById('newShortcutNome');
        const urlInp = document.getElementById('newShortcutUrl');
        addBtn?.addEventListener('click', () => {
            const nomeVal = nomeInp.value.trim();
            const urlVal = urlInp.value.trim();
            if (!nomeVal || !urlVal) { alert('Preencha ambos'); return; }
            adicionarAtalho(aba.id, nomeVal, urlVal);
            nomeInp.value = '';
            urlInp.value = '';
        });

        const lista = document.getElementById('shortcutsList');
        const itens = lista.querySelectorAll('.shortcut-item');
        
        itens.forEach(item => {
            const shortcutId = item.dataset.shortcutId;
            const atalhoReal = aba.shortcuts.find(s => s.id === shortcutId);
            if (!atalhoReal) return;

            item.addEventListener('dragstart', (e) => {
                dragSource = {
                    abaId: aba.id,
                    shortcutId: shortcutId,
                    indexOrigem: aba.shortcuts.findIndex(s => s.id === shortcutId)
                };
                e.dataTransfer.setData('text/plain', shortcutId);
                e.dataTransfer.effectAllowed = 'move';
                item.classList.add('dragging');
            });
            item.addEventListener('dragend', (e) => {
                item.classList.remove('dragging');
                dragSource = { abaId: null, shortcutId: null, indexOrigem: null };
                itens.forEach(i => i.classList.remove('drop-before', 'drop-after'));
            });
            item.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const targetItem = e.currentTarget;
                const rect = targetItem.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const meio = rect.height / 2;
                itens.forEach(i => i.classList.remove('drop-before', 'drop-after'));
                if (y < meio) {
                    targetItem.classList.add('drop-before');
                } else {
                    targetItem.classList.add('drop-after');
                }
            });
            item.addEventListener('dragleave', () => {
                item.classList.remove('drop-before', 'drop-after');
            });
            item.addEventListener('drop', (e) => {
                e.preventDefault();
                itens.forEach(i => i.classList.remove('drop-before', 'drop-after'));
                if (!dragSource.shortcutId || dragSource.abaId !== aba.id) {
                    if (dragSource.shortcutId && dragSource.abaId !== aba.id) {
                        const targetItem = e.currentTarget;
                        const targetShortcutId = targetItem.dataset.shortcutId;
                        const targetIndex = aba.shortcuts.findIndex(s => s.id === targetShortcutId);
                        const rect = targetItem.getBoundingClientRect();
                        const y = e.clientY - rect.top;
                        const meio = rect.height / 2;
                        let novoIndex = targetIndex;
                        if (y >= meio) novoIndex = targetIndex + 1;
                        moverAtalhoParaAba(dragSource.shortcutId, dragSource.abaId, aba.id, novoIndex);
                        dragSource = { abaId: null, shortcutId: null, indexOrigem: null };
                        return;
                    }
                    return;
                }
                const targetItem = e.currentTarget;
                const targetShortcutId = targetItem.dataset.shortcutId;
                const targetIndex = aba.shortcuts.findIndex(s => s.id === targetShortcutId);
                const rect = targetItem.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const meio = rect.height / 2;
                let novoIndex = targetIndex;
                if (y >= meio) novoIndex = targetIndex + 1;

                if (dragSource.indexOrigem !== undefined && dragSource.indexOrigem !== novoIndex) {
                    const [movido] = aba.shortcuts.splice(dragSource.indexOrigem, 1);
                    const ajuste = dragSource.indexOrigem < novoIndex ? novoIndex - 1 : novoIndex;
                    aba.shortcuts.splice(ajuste, 0, movido);
                    salvarDados();
                    renderizarAbaAtivaConteudo();
                }
            });
        });

        if (lista && atalhosFiltrados.length === 0) {
            lista.addEventListener('dragover', (e) => e.preventDefault());
            lista.addEventListener('drop', (e) => {
                e.preventDefault();
                if (dragSource.shortcutId && dragSource.abaId !== aba.id) {
                    moverAtalhoParaAba(dragSource.shortcutId, dragSource.abaId, aba.id, aba.shortcuts.length);
                    dragSource = { abaId: null, shortcutId: null, indexOrigem: null };
                }
            });
        }

        lista.querySelectorAll('.shortcut-item').forEach(item => {
            const shortcutId = item.dataset.shortcutId;
            const atalho = aba.shortcuts.find(s => s.id === shortcutId);
            if (atalho) {
                const linkDiv = item.querySelector('.shortcut-link');
                linkDiv?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(atalho.url, '_blank');
                });
                const openBtn = item.querySelector('.open-newtab');
                openBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(atalho.url, '_blank');
                });
                const editBtn = item.querySelector('.edit-shortcut');
                editBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const novoNome = prompt('Editar nome:', atalho.nome);
                    const novaUrl = prompt('Editar URL:', atalho.url);
                    if (novoNome || novaUrl) editarAtalho(aba.id, atalho.id, novoNome || atalho.nome, novaUrl || atalho.url);
                });
                const delBtn = item.querySelector('.delete-shortcut');
                delBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Remover "${atalho.nome}"?`)) removerAtalho(aba.id, atalho.id);
                });
            }
        });
    }

    function renderBuscaGlobal(termo) {
        const resultsDiv = document.getElementById('globalResults');
        if (!termo.trim()) {
            resultsDiv.classList.remove('show');
            resultsDiv.innerHTML = '';
            return;
        }
        const termLower = termo.trim().toLowerCase();
        const resultados = [];
        for (const aba of abas) {
            for (const atalho of aba.shortcuts) {
                if (atalho.nome.toLowerCase().includes(termLower) || atalho.url.toLowerCase().includes(termLower)) {
                    resultados.push({ abaId: aba.id, abaNome: aba.nome, atalho });
                }
            }
        }
        if (resultados.length === 0) {
            resultsDiv.innerHTML = '<div style="padding: 10px;">Nenhum atalho encontrado</div>';
            resultsDiv.classList.add('show');
            return;
        }
        resultsDiv.innerHTML = resultados.map(res => `
            <div class="result-item" data-url="${escapeHtml(res.atalho.url)}" data-shortcut-name="${escapeHtml(res.atalho.nome)}">
                <div class="result-info"><strong>${escapeHtml(res.atalho.nome)}</strong> <span>📁 ${escapeHtml(res.abaNome)}</span></div>
                <div class="result-action">Abrir →</div>
            </div>
        `).join('');
        resultsDiv.classList.add('show');
        document.querySelectorAll('.result-item').forEach(el => {
            el.addEventListener('click', () => {
                const url = el.dataset.url;
                if (url) window.open(url, '_blank');
            });
        });
    }

    function renderizarInterface() {
        atualizarDatalistNomes();
        renderizarAbasHeader();
        
        if (activeTabId && abas.find(a => a.id === activeTabId)) renderizarAbaAtivaConteudo();
        else if (abas.length) { activeTabId = abas[0].id; renderizarAbaAtivaConteudo(); }
        else document.getElementById('tabContentContainer').innerHTML = '<div style="padding:40px;">Clique em + Nova Aba</div>';
        
        const searchGlobal = document.getElementById('globalSearchInput');
        if (searchGlobal) {
            const handler = () => renderBuscaGlobal(searchGlobal.value);
            searchGlobal.removeEventListener('input', handler);
            searchGlobal.addEventListener('input', handler);
            renderBuscaGlobal(searchGlobal.value);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }

    carregarDados();
    renderizarInterface();
    window.addEventListener('beforeunload', () => salvarDados());
</script>
</body>
</html>
